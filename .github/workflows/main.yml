name: Build MemoOverlay IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v4

    - name: Xcode 버전 확인 및 선택
      run: |
        ls /Applications/ | grep Xcode
        sudo xcode-select -s $(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
        xcodebuild -version

    - name: xcodegen 설치 및 프로젝트 생성
      run: |
        brew install xcodegen

        SOURCE_DIR=$(find . -name "AppDelegate.swift" | head -1 | xargs dirname)
        echo "SOURCE_DIR=$SOURCE_DIR"

        XCODE_VER=$(xcodebuild -version | head -1 | awk '{print $2}')
        echo "Xcode version: $XCODE_VER"

        cat > project.yml << EOF
        name: MemoOverlay
        options:
          bundleIdPrefix: com.yourname
          deploymentTarget:
            iOS: "16.0"
        targets:
          MemoOverlay:
            type: application
            platform: iOS
            sources:
              - path: ${SOURCE_DIR}
            settings:
              base:
                PRODUCT_BUNDLE_IDENTIFIER: com.yourname.memooverlay
                SWIFT_VERSION: 5.0
                CODE_SIGN_IDENTITY: ""
                CODE_SIGNING_REQUIRED: "NO"
                CODE_SIGNING_ALLOWED: "NO"
                ENABLE_BITCODE: "NO"
                ONLY_ACTIVE_ARCH: "NO"
                ARCHS: "arm64"
                VALID_ARCHS: "arm64"
                INFOPLIST_FILE: ${SOURCE_DIR}/Info.plist
        EOF

        cat project.yml
        xcodegen generate

    - name: 빌드
      run: |
        xcodebuild \
          -project MemoOverlay.xcodeproj \
          -scheme MemoOverlay \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          ONLY_ACTIVE_ARCH=NO \
          clean build 2>&1 | tail -50

    - name: entitlements 서명
      run: |
        APP_PATH=$(find build -name "MemoOverlay.app" -type d | head -1)
        echo "APP_PATH=$APP_PATH"
        echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
        ENTITLEMENTS=$(find . -name "*.entitlements" | head -1)
        brew install ldid
        ldid -S"$ENTITLEMENTS" "$APP_PATH/MemoOverlay"

    - name: .ipa 패키징
      run: |
        mkdir -p Payload
        cp -r "$APP_PATH" Payload/
        zip -r MemoOverlay.ipa Payload
        rm -rf Payload

    - name: .ipa 업로드
      uses: actions/upload-artifact@v4
      with:
        name: MemoOverlay-ipa
        path: MemoOverlay.ipa
        if-no-files-found: error
